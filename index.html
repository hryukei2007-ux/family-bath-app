<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お風呂管理アプリ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f0f4f8; padding: 20px; }
        .card { background: white; border-radius: 15px; margin: 15px auto; padding: 20px; max-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* 1. 入浴中のカードを赤くして目立たせる設定 */
        .card.in-bath { border: 3px solid #ff4d4d; background-color: #fff5f5; }

        /* 2. 【重要】誰かが入っている時に、他のボタンをグレーにして押せなくする設定 */
        button:disabled {
            background-color: #bbb !important;
            cursor: not-allowed !important;
            opacity: 0.6;
        }
        #app-screen { display: none; } /* 最初は隠す */
        #login-screen { margin-top: 50px; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; width: 200px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 5px; background-color: #333; color: white; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🔑 合言葉を入力</h1>
        <p>一宮の家族だけが知っている言葉を入れてね</p>
        <input type="password" id="password-input" placeholder="合言葉は？">
        <br>
        <button onclick="checkPassword()">ログイン</button>
    </div>

    <div id="app-screen">
        <h2 style="color: #444;">🛀 お風呂管理システム</h2>
        <div id="member-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyCkLEcunc5idyyAEbr0DgCR6sACpzDbPcY",
            authDomain: "family-bath-app.firebaseapp.com",
            databaseURL: "https://family-bath-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "family-bath-app",
            storageBucket: "family-bath-app.firebasestorage.app",
            messagingSenderId: "326797389505",
            appId: "1:326797389505:web:5a2339b4b9d78bb169bb78"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 合言葉チェック
        function checkPassword() {
            if (document.getElementById('password-input').value === "runasoru") {
                showApp();
            } else { alert('違うよ'); }
        }

        // アプリメイン画面の表示
        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            
            const members = [
                {id: "father", name: "お父さん"},
                {id: "mother", name: "お母さん"},
                {id: "ryukei", name: "龍慶"},
                {id: "kana", name: "かな"}
            ];

            // データのリアルタイム監視
            database.ref('bath_status').on('value', (snapshot) => {
                const statuses = snapshot.val() || {};
                const listDiv = document.getElementById('member-list');
                
                // 現在「誰か一人が」入っているか確認
                const anyoneIn = Object.values(statuses).some(s => s === true);
                
                listDiv.innerHTML = '';
                members.forEach(m => {
                    const isIn = statuses[m.id] || false;
                    const card = document.createElement('div');
                    card.className = `card ${isIn ? 'in-bath' : 'out-bath'}`;
                    
                    // 【お父さんの課題解決】
                    // 「自分が入っている」または「誰も入っていない」時だけボタンを押せる
                    const canPress = isIn || !anyoneIn;

                    card.innerHTML = `
                        <h3>${m.name}</h3>
                        <p style="font-size: 1.2rem; font-weight: bold;">${isIn ? '🛀 入浴中' : '✨ 空いてます'}</p>
                        <button onclick="toggle('${m.id}', ${isIn})" ${canPress ? '' : 'disabled'}>
                            ${isIn ? 'あがった' : (anyoneIn ? '誰かが入浴中' : '入る')}
                        </button>
                    `;
                    listDiv.appendChild(card);
                });
            });
        }

        // 状態の切り替え（Firebaseの更新のみ）
        function toggle(id, current) {
            database.ref('bath_status/' + id).set(!current);
        }

        // セキュリティのため、開くたびに必ず合言葉を求める
        window.onload = () => {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app-screen').style.display = 'none';
        };
    </script>
</body>
</html>
